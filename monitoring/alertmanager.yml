global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true

receivers:
  - name: 'default'
    webhook_configs:
      - url: '${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9999/alert}'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: '${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9999/alert}'
        send_resolved: true
